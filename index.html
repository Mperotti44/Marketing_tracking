<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>°CRYO On — Marketing Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f4f7f9;--surface:#fff;--surface2:#eef4f7;
  --border:#dce8ed;--border2:#c8dce5;
  --cyan:#00b4d8;--cyan-dark:#0096b7;--cyan-pale:#e0f4fa;
  --navy:#0a2540;--navy2:#1a3a5c;
  --text:#0a2540;--text2:#4a6580;--text3:#8aa4b8;
  --green:#00c896;--green-pale:#e6faf5;
  --red:#e53e3e;--red-pale:#fdecea;
  --amber:#f59e0b;--amber-pale:#fef3cd;
  --shadow:0 1px 4px rgba(0,40,80,.07),0 4px 16px rgba(0,40,80,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.nav-btn{background:none;border:1.5px solid var(--border);color:var(--text2);padding:7px 18px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;border-radius:8px;transition:all .18s}
.nav-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.nav-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.br-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text2);padding:6px 16px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;border-radius:8px;transition:all .15s}
.br-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.br-btn.active{background:var(--cyan);color:#fff;border-color:var(--cyan)}
.inp{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:10px 14px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:all .15s;border-radius:8px}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,180,216,.12)}
.inp::placeholder{color:var(--text3)}
.inp:disabled{color:var(--cyan-dark);background:var(--cyan-pale);border-color:rgba(0,180,216,.3);cursor:default;font-weight:600}
select{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:8px 12px;font-family:inherit;font-size:13px;outline:none;border-radius:8px;cursor:pointer}
select:focus{border-color:var(--cyan)}
.save-btn{background:var(--navy);color:#fff;border:none;padding:12px 36px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;border-radius:10px;transition:all .18s;box-shadow:0 4px 12px rgba(10,37,64,.25)}
.save-btn:hover:not(:disabled){background:var(--navy2);transform:translateY(-1px)}
.save-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.copy-btn{background:var(--cyan);color:#fff;border:none;padding:12px 28px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;border-radius:10px;transition:all .18s}
.copy-btn:hover{background:var(--cyan-dark)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow)}
.card-hl{background:linear-gradient(135deg,#e8f8fd,#f0fbfe);border:1.5px solid rgba(0,180,216,.25);border-radius:12px;padding:18px 20px;box-shadow:0 2px 12px rgba(0,180,216,.08)}
.lbl{font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.big-num{font-size:24px;font-weight:700;color:var(--text);line-height:1.1;font-family:'DM Mono',monospace}
.sub-txt{font-size:11px;color:var(--text3);margin-top:4px}
.tbl-row{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
.tbl-row:hover td{background:var(--surface2) !important}
.divider{height:1px;background:var(--border);margin:24px 0}
.tag-auto{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:20px;background:var(--cyan-pale);color:var(--cyan-dark);border:1px solid rgba(0,180,216,.25)}
.section-header{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--cyan-pale);display:flex;align-items:center;gap:8px}
.section-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);flex-shrink:0}
.rag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.04em}
.rag-green{background:var(--green-pale);color:#00a87a;border:1px solid #b3edd9}
.rag-amber{background:var(--amber-pale);color:#b45309;border:1px solid #fcd97a}
.rag-red{background:var(--red-pale);color:#c0392b;border:1px solid #f5c0be}
.ctrl-bar{display:flex;gap:14px;align-items:flex-end;margin-bottom:28px;flex-wrap:wrap;background:var(--surface);padding:16px 20px;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const {useState, useEffect, useCallback, useRef} = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbyLNfymDLl2CrceyG67WcfhOkgjJCEG9o6qccBwGl5s_rzkwaD8FEJhcof5GHe3XhkCNQ/exec";

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const WEEKS  = ["W1","W2","W3","W4","W5"];

const FIELDS = [
  "spend",
  "chats","unqualified","qualified",
  "booked","shows","sells",
  "revenue_new","revenue_packs",
  "reach_fb","reach_ig","reach_tiktok",
  "followers_fb","followers_ig","followers_tiktok",
];

const pad  = n => String(n).padStart(2,"0");
const mkId = (y,m,w) => "MKT_"+y+"_"+pad(m+1)+"_"+w;
const num  = v => Number(v)||0;

function fC(v){ return "฿"+num(v).toLocaleString("en-US",{maximumFractionDigits:0}); }
function fN(v){ return num(v).toLocaleString("en-US",{maximumFractionDigits:0}); }
function fP(v){ return num(v).toFixed(1)+"%"; }
function fX(v){ return num(v).toFixed(2)+"x"; }
function pct(a,b){ return num(b)>0?((num(a)/num(b))*100).toFixed(1)+"%":"—"; }
function ragCol(actual,target,amber=0.15){
  if(!target||target===0) return "none";
  const p=actual/target;
  if(p>=1) return "green";
  if(p>=(1-amber)) return "amber";
  return "red";
}

async function apiGet(){
  const r=await fetch(GAS_URL);
  if(!r.ok) throw new Error("GET failed "+r.status);
  return r.json();
}
async function apiSave(data){
  await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(data)});
}

// ── Field components defined OUTSIDE App to prevent focus loss on re-render ──

function Field({label,fkey,fkStr,defVal,onChange,note}){
  return (
    <div>
      <div className="lbl">{label}</div>
      <input key={fkStr+"__"+fkey} type="number" placeholder="0" className="inp"
        defaultValue={defVal||""} onChange={e=>onChange(fkey,e.target.value)}/>
      {note&&<div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>{note}</div>}
    </div>
  );
}

function AutoField({label,value,note}){
  return (
    <div>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:7}}>
        <div className="lbl" style={{marginBottom:0}}>{label}</div>
        <span className="tag-auto">AUTO</span>
      </div>
      <input className="inp" disabled value={value} readOnly/>
      {note&&<div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>{note}</div>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────

function App(){
  const today=new Date();
  const [view,    setView]    = useState("input");
  const [year,    setYear]    = useState(today.getFullYear());
  const [month,   setMonth]   = useState(today.getMonth());
  const [week,    setWeek]    = useState("W1");
  const [allRows, setAllRows] = useState([]);
  const [loading, setLoading] = useState(false);
  const [saving,  setSaving]  = useState(false);
  const [saveMsg, setSaveMsg] = useState("");
  const [copied,  setCopied]  = useState(false);
  const [calc,    setCalc]    = useState({revTotal:0,cpc:0,cpql:0,cpb:0,cps:0,ctb:0,bts:0,sts:0,cts:0,roas:0});
  const vals  = useRef({});
  const fkStr = year+"_"+month+"_"+week;

  function recalc(f){
    const spend=num(f.spend), chats=num(f.chats), qual=num(f.qualified);
    const booked=num(f.booked), shows=num(f.shows), sells=num(f.sells);
    const revTot=num(f.revenue_new)+num(f.revenue_packs);
    setCalc({
      revTotal:revTot,
      cpc:  chats>0?spend/chats:0,
      cpql: qual>0?spend/qual:0,
      cpb:  booked>0?spend/booked:0,
      cps:  sells>0?spend/sells:0,
      ctb:  chats>0?(booked/chats)*100:0,
      bts:  booked>0?(shows/booked)*100:0,
      sts:  shows>0?(sells/shows)*100:0,
      cts:  chats>0?(sells/chats)*100:0,
      roas: spend>0?revTot/spend:0,
    });
  }

  function setVal(key,v){ vals.current[key]=v; recalc(vals.current); }

  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{ const r=await apiGet(); setAllRows(Array.isArray(r)?r:[]); }
    catch(e){ console.error(e); setAllRows([]); }
    setLoading(false);
  },[]);

  useEffect(()=>{ loadAll(); },[loadAll]);

  useEffect(()=>{
    const row=allRows.find(r=>r.id===mkId(year,month,week));
    const f={};
    if(row){ FIELDS.forEach(k=>{ f[k]=row[k]||""; }); }
    vals.current=f;
    recalc(f);
  },[year,month,week,allRows]);

  function getMonthRows(y,m){
    return allRows.filter(r=>
      String(r.year)===String(y)&&
      String(r.month)===String(m+1)&&
      String(r.id||"").startsWith("MKT_")
    );
  }
  function sumW(rows,field){ return rows.reduce((s,r)=>s+num(r[field]),0); }

  async function handleSave(){
    setSaving(true); setSaveMsg("Saving…");
    try{
      const f=vals.current;
      const data={
        id:mkId(year,month,week), year:String(year), month:String(month+1), week,
        spend:num(f.spend), chats:num(f.chats), unqualified:num(f.unqualified),
        qualified:num(f.qualified), booked:num(f.booked), shows:num(f.shows), sells:num(f.sells),
        revenue_new:num(f.revenue_new), revenue_packs:num(f.revenue_packs),
        revenue_total:calc.revTotal,
        cpc:calc.cpc.toFixed(2), cpql:calc.cpql.toFixed(2),
        cpb:calc.cpb.toFixed(2), cps:calc.cps.toFixed(2),
        chat_to_book:calc.ctb.toFixed(2), book_to_show:calc.bts.toFixed(2),
        show_to_sell:calc.sts.toFixed(2), chat_to_sell:calc.cts.toFixed(2),
        roas:calc.roas.toFixed(3),
        reach_fb:num(f.reach_fb), reach_ig:num(f.reach_ig), reach_tiktok:num(f.reach_tiktok),
        followers_fb:num(f.followers_fb), followers_ig:num(f.followers_ig),
        followers_tiktok:num(f.followers_tiktok),
      };
      await apiSave(data);
      setAllRows(prev=>[...prev.filter(r=>r.id!==data.id),data]);
      setSaveMsg("✓ Saved to Google Sheets");
    } catch(e){ setSaveMsg("✗ Save failed — check connection"); console.error(e); }
    setSaving(false);
    setTimeout(()=>setSaveMsg(""),5000);
  }

  function buildReport(){
    const f=vals.current;
    return `°CRYO On — MARKETING WEEKLY REPORT
Week ${week} · ${MONTHS[month]} ${year}
Generated: ${today.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}
══════════════════════════════════════
SPEND
══════════════════════════════════════
Ad Spend:            ${fC(f.spend)}

══════════════════════════════════════
FUNNEL
══════════════════════════════════════
Total Chats:         ${fN(f.chats)}
  Unqualified:       ${fN(f.unqualified)} (${pct(f.unqualified,f.chats)})
  Qualified:         ${fN(f.qualified)} (${pct(f.qualified,f.chats)})
Booked:              ${fN(f.booked)}
Shows (Arrived):     ${fN(f.shows)}
Sells (Purchased):   ${fN(f.sells)}

══════════════════════════════════════
CONVERSION RATES
══════════════════════════════════════
Chat → Booked:       ${calc.ctb.toFixed(1)}%
Booked → Show:       ${calc.bts.toFixed(1)}%
Show → Sell:         ${calc.sts.toFixed(1)}%
Chat → Sell:         ${calc.cts.toFixed(1)}%

══════════════════════════════════════
COST METRICS
══════════════════════════════════════
Cost per Chat:       ${fC(calc.cpc)}
Cost per Qualified:  ${fC(calc.cpql)}
Cost per Booking:    ${fC(calc.cpb)}
Cost per Sell:       ${fC(calc.cps)}

══════════════════════════════════════
REVENUE
══════════════════════════════════════
New Single Rev:      ${fC(f.revenue_new)}
Pack / Member Rev:   ${fC(f.revenue_packs)}
Total New Revenue:   ${fC(calc.revTotal)}
ROAS:                ${calc.roas.toFixed(2)}x
Revenue per Sell:    ${num(f.sells)>0?fC(calc.revTotal/num(f.sells)):"—"}

══════════════════════════════════════
SOCIAL
══════════════════════════════════════
FB Reach:            ${fN(f.reach_fb)}
IG Reach:            ${fN(f.reach_ig)}
TikTok Reach:        ${fN(f.reach_tiktok)}
FB Followers:        ${fN(f.followers_fb)}
IG Followers:        ${fN(f.followers_ig)}
TikTok Followers:    ${fN(f.followers_tiktok)}
══════════════════════════════════════`;
  }

  async function handleCopy(){
    try{ await navigator.clipboard.writeText(buildReport()); setCopied(true); setTimeout(()=>setCopied(false),3000); }
    catch{ alert("Copy failed — select text manually"); }
  }

  const curRow    = allRows.find(r=>r.id===mkId(year,month,week));
  const monthRows = getMonthRows(year,month);
  const RC        = {green:"var(--green)",amber:"var(--amber)",red:"var(--red)",none:"var(--border2)"};

  return (
    <div>

      {/* HEADER */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",
        padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",
        height:58,position:"sticky",top:0,zIndex:200,boxShadow:"0 2px 12px rgba(0,40,80,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div>
            <span style={{fontSize:20,fontWeight:800,letterSpacing:"-.02em",color:"var(--navy)"}}>°CRYO</span>
            <span style={{fontSize:20,fontWeight:300,color:"var(--cyan)"}}> On</span>
            <span style={{fontSize:10,color:"var(--text3)",marginLeft:10,letterSpacing:".12em",fontWeight:600}}>MARKETING TRACKER</span>
          </div>
          {loading&&<div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:"var(--cyan)",animation:"pulse 1s infinite"}}/>
            <span style={{fontSize:11,color:"var(--text3)"}}>Syncing…</span>
          </div>}
        </div>
        <div style={{display:"flex",gap:5}}>
          {[["input","Weekly Input"],["dashboard","Dashboard"],["log","Monthly Log"]].map(([v,l])=>(
            <button key={v} className={"nav-btn"+(view===v?" active":"")} onClick={()=>setView(v)}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {saveMsg&&<span style={{fontSize:12,fontWeight:600,
            color:saveMsg.startsWith("✓")?"var(--green)":saveMsg.startsWith("✗")?"var(--red)":"var(--text3)"}}>
            {saveMsg}</span>}
          <div style={{fontSize:12,color:"var(--text3)",fontWeight:500}}>
            {MONTHS[today.getMonth()].slice(0,3)} {today.getDate()}, {today.getFullYear()}
          </div>
        </div>
      </div>

      {/* ══ WEEKLY INPUT ══ */}
      {view==="input"&&(
        <div style={{maxWidth:860,margin:"0 auto",padding:"32px 24px"}}>

          <div className="ctrl-bar">
            <div>
              <div className="lbl">Month</div>
              <select value={month} onChange={e=>setMonth(Number(e.target.value))}>
                {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
            </div>
            <div>
              <div className="lbl">Week</div>
              <div style={{display:"flex",gap:6}}>
                {WEEKS.map(w=><button key={w} className={"br-btn"+(week===w?" active":"")} onClick={()=>setWeek(w)}>{w}</button>)}
              </div>
            </div>
            <div>
              <div className="lbl">Year</div>
              <select value={year} onChange={e=>setYear(Number(e.target.value))}>
                {[2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
              </select>
            </div>
            <div style={{marginLeft:"auto",
              background:curRow?"var(--green-pale)":"var(--amber-pale)",
              border:"1px solid "+(curRow?"#b3edd9":"#fcd97a"),
              borderRadius:8,padding:"6px 14px",fontSize:11,
              color:curRow?"#00a87a":"#b45309",fontWeight:700}}>
              {curRow?"✓ Saved for this week":"No data yet — fill in and save"}
            </div>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24}}>
            <div style={{background:"var(--navy)",color:"#fff",borderRadius:10,padding:"8px 18px",fontWeight:800,fontSize:18}}>{week}</div>
            <div>
              <div style={{fontWeight:700,fontSize:16,color:"var(--navy)"}}>{MONTHS[month]} {year}</div>
              <div style={{fontSize:12,color:"var(--text3)"}}>BB fills in weekly · Marc reviews the copied report</div>
            </div>
          </div>

          {/* SPEND */}
          <div className="section-header"><span className="section-dot"/>Ad Spend</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:28}}>
            <Field label="Total Ad Spend (THB)" fkey="spend" fkStr={fkStr}
              defVal={vals.current.spend} onChange={setVal} note="All channels — Meta + TikTok combined"/>
          </div>

          <div className="divider"/>

          {/* FUNNEL */}
          <div className="section-header"><span className="section-dot"/>Funnel</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>
            <Field label="Total Chats" fkey="chats" fkStr={fkStr}
              defVal={vals.current.chats} onChange={setVal} note="All Messenger + DM conversations opened"/>
            <Field label="Unqualified" fkey="unqualified" fkStr={fkStr}
              defVal={vals.current.unqualified} onChange={setVal} note="Spam, wrong market, ghosted"/>
            <Field label="Qualified Leads" fkey="qualified" fkStr={fkStr}
              defVal={vals.current.qualified} onChange={setVal} note="Genuine interest, engaged with price/location"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
            <Field label="Booked" fkey="booked" fkStr={fkStr}
              defVal={vals.current.booked} onChange={setVal} note="Confirmed appointment"/>
            <Field label="Shows (Arrived)" fkey="shows" fkStr={fkStr}
              defVal={vals.current.shows} onChange={setVal} note="Actually walked in"/>
            <Field label="Sells (Purchased)" fkey="sells" fkStr={fkStr}
              defVal={vals.current.sells} onChange={setVal} note="Completed a purchase"/>
          </div>

          {/* Auto conversion rates */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:28}}>
            {[
              {label:"Chat → Booked",val:calc.ctb,good:15,ok:10},
              {label:"Booked → Show",val:calc.bts,good:70,ok:60},
              {label:"Show → Sell",  val:calc.sts,good:50,ok:40},
              {label:"Chat → Sell",  val:calc.cts,good:8, ok:5},
            ].map(({label,val,good,ok})=>{
              const col=val>=good?"var(--green)":val>=ok?"var(--amber)":"var(--red)";
              return (
                <div key={label} className="card-hl" style={{padding:"12px 14px"}}>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                    <div className="lbl" style={{marginBottom:0}}>{label}</div>
                    <span className="tag-auto">AUTO</span>
                  </div>
                  <div style={{fontSize:22,fontWeight:700,color:col,fontFamily:"DM Mono,monospace"}}>{fP(val)}</div>
                </div>
              );
            })}
          </div>

          <div className="divider"/>

          {/* REVENUE */}
          <div className="section-header"><span className="section-dot"/>Revenue from New Clients</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>
            <Field label="New Single Revenue (THB)" fkey="revenue_new" fkStr={fkStr}
              defVal={vals.current.revenue_new} onChange={setVal} note="Singles from first-time clients"/>
            <Field label="Pack / Member Revenue (THB)" fkey="revenue_packs" fkStr={fkStr}
              defVal={vals.current.revenue_packs} onChange={setVal} note="Packs and memberships from new clients"/>
            <AutoField label="Total New Revenue" value={fC(calc.revTotal)} note="Single + pack"/>
          </div>

          {/* Cost metrics */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
            {[
              {label:"Cost / Chat",    val:calc.cpc},
              {label:"Cost / QL",      val:calc.cpql},
              {label:"Cost / Booking", val:calc.cpb},
              {label:"Cost / Sell",    val:calc.cps},
            ].map(({label,val})=>(
              <div key={label} className="card" style={{padding:"12px 14px"}}>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                  <div className="lbl" style={{marginBottom:0}}>{label}</div>
                  <span className="tag-auto">AUTO</span>
                </div>
                <div style={{fontSize:18,fontWeight:700,color:"var(--navy)",fontFamily:"DM Mono,monospace"}}>{fC(val)}</div>
              </div>
            ))}
          </div>

          {/* ROAS */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:28}}>
            <div className="card-hl" style={{borderLeft:"4px solid var(--cyan)"}}>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
                <div className="lbl" style={{marginBottom:0}}>ROAS</div>
                <span className="tag-auto">AUTO</span>
              </div>
              <div style={{fontSize:32,fontWeight:700,fontFamily:"DM Mono,monospace",
                color:calc.roas>=3?"var(--green)":calc.roas>=2?"var(--amber)":calc.roas>=1?"var(--text2)":"var(--red)"}}>
                {calc.roas.toFixed(2)}x
              </div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:6}}>
                {calc.roas>=3?"🟢 Strong — above 3x":calc.roas>=2?"🟡 Good — 2–3x":calc.roas>=1?"🟠 Marginal — 1–2x":"🔴 Below break-even"}
              </div>
            </div>
            <div className="card">
              <div className="lbl">Revenue per Sell</div>
              <div style={{fontSize:28,fontWeight:700,color:"var(--text)",fontFamily:"DM Mono,monospace"}}>
                {num(vals.current.sells)>0?fC(calc.revTotal/num(vals.current.sells)):"—"}
              </div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:6}}>Avg ticket value this week</div>
            </div>
          </div>

          <div className="divider"/>

          {/* SOCIAL */}
          <div className="section-header"><span className="section-dot"/>Social Media</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:28}}>
            <Field label="FB Reach"                     fkey="reach_fb"          fkStr={fkStr} defVal={vals.current.reach_fb}          onChange={setVal}/>
            <Field label="IG Reach"                     fkey="reach_ig"          fkStr={fkStr} defVal={vals.current.reach_ig}          onChange={setVal}/>
            <Field label="TikTok Reach"                 fkey="reach_tiktok"      fkStr={fkStr} defVal={vals.current.reach_tiktok}      onChange={setVal}/>
            <Field label="FB Accumulated Followers"     fkey="followers_fb"      fkStr={fkStr} defVal={vals.current.followers_fb}      onChange={setVal}/>
            <Field label="IG Accumulated Followers"     fkey="followers_ig"      fkStr={fkStr} defVal={vals.current.followers_ig}      onChange={setVal}/>
            <Field label="TikTok Accumulated Followers" fkey="followers_tiktok"  fkStr={fkStr} defVal={vals.current.followers_tiktok}  onChange={setVal}/>
          </div>

          {/* SAVE + COPY */}
          <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",marginBottom:24}}>
            <button className="save-btn" onClick={handleSave} disabled={saving}>
              {saving?"Saving…":"Save Week"}
            </button>
            <button className="copy-btn" onClick={handleCopy}>
              {copied?"✓ Copied!":"Copy Report for Marc"}
            </button>
            <span style={{fontSize:11,color:"var(--text3)"}}>
              Save → Google Sheets · Copy → paste into Claude for review
            </span>
          </div>

          {copied&&(
            <div style={{background:"var(--navy)",borderRadius:12,padding:"20px 24px"}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--cyan)",marginBottom:12,letterSpacing:".1em"}}>COPIED — PASTE INTO CLAUDE</div>
              <pre style={{fontSize:11,color:"rgba(255,255,255,.8)",fontFamily:"DM Mono,monospace",whiteSpace:"pre-wrap",lineHeight:1.8}}>{buildReport()}</pre>
            </div>
          )}
        </div>
      )}

      {/* ══ DASHBOARD ══ */}
      {view==="dashboard"&&(
        <div style={{maxWidth:1100,margin:"0 auto",padding:"32px 24px"}}>
          <div className="ctrl-bar">
            <div>
              <div className="lbl">Month</div>
              <select value={month} onChange={e=>setMonth(Number(e.target.value))}>
                {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
            </div>
            <div>
              <div className="lbl">Year</div>
              <select value={year} onChange={e=>setYear(Number(e.target.value))}>
                {[2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
              </select>
            </div>
            <div style={{marginLeft:"auto",fontSize:11,color:"var(--text3)",fontWeight:600}}>
              {monthRows.length} week(s) of data · {MONTHS[month]} {year}
            </div>
          </div>

          {monthRows.length===0?(
            <div className="card" style={{textAlign:"center",padding:"48px",color:"var(--text3)"}}>
              No data yet for {MONTHS[month]} {year}. Start entering data in Weekly Input.
            </div>
          ):(()=>{
            const spend  = sumW(monthRows,"spend");
            const chats  = sumW(monthRows,"chats");
            const unq    = sumW(monthRows,"unqualified");
            const qual   = sumW(monthRows,"qualified");
            const booked = sumW(monthRows,"booked");
            const shows  = sumW(monthRows,"shows");
            const sells  = sumW(monthRows,"sells");
            const revNew = sumW(monthRows,"revenue_new");
            const revPk  = sumW(monthRows,"revenue_packs");
            const revTot = sumW(monthRows,"revenue_total");
            const ctb    = chats>0?(booked/chats)*100:0;
            const bts    = booked>0?(shows/booked)*100:0;
            const sts    = shows>0?(sells/shows)*100:0;
            const cts    = chats>0?(sells/chats)*100:0;
            const roas   = spend>0?revTot/spend:0;

            return (
              <div>
                <div className="section-header"><span className="section-dot"/>Funnel — Month to Date</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:28}}>
                  {[
                    {label:"Ad Spend",        val:fC(spend), hl:true},
                    {label:"Total Chats",     val:fN(chats), sub:fN(unq)+" unqualified · "+pct(qual,chats)+" qualified"},
                    {label:"Qualified Leads", val:fN(qual)},
                    {label:"Booked",          val:fN(booked)},
                    {label:"Shows",           val:fN(shows)},
                    {label:"Sells",           val:fN(sells)},
                  ].map(({label,val,hl,sub})=>(
                    <div key={label} className={hl?"card-hl":"card"}>
                      <div className="lbl">{label}</div>
                      <div className="big-num" style={{color:hl?"var(--cyan-dark)":"var(--text)"}}>{val}</div>
                      {sub&&<div className="sub-txt">{sub}</div>}
                    </div>
                  ))}
                </div>

                <div className="section-header"><span className="section-dot"/>Conversion Rates — Month to Date</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
                  {[
                    {label:"Chat → Booked",val:ctb, bench:15,disp:fP(ctb),tgt:">15%"},
                    {label:"Booked → Show",val:bts, bench:70,disp:fP(bts),tgt:">70%"},
                    {label:"Show → Sell",  val:sts, bench:50,disp:fP(sts),tgt:">50%"},
                    {label:"ROAS",         val:roas,bench:2, disp:fX(roas),tgt:">2x"},
                  ].map(({label,val,bench,disp,tgt})=>{
                    const r=ragCol(val,bench);
                    return (
                      <div key={label} className="card" style={{borderLeft:"4px solid "+(r!=="none"?RC[r]:"var(--border)")}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                          <div className="lbl" style={{marginBottom:0}}>{label}</div>
                          {r!=="none"&&<span className={"rag rag-"+r}>{r==="green"?"🟢":r==="amber"?"🟡":"🔴"}</span>}
                        </div>
                        <div className="big-num" style={{color:r!=="none"?RC[r]:"var(--text)"}}>{disp}</div>
                        <div className="sub-txt">Target {tgt}</div>
                      </div>
                    );
                  })}
                </div>

                <div className="section-header"><span className="section-dot"/>Cost Metrics — Month to Date</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
                  {[
                    {label:"Cost / Chat",    val:chats>0?spend/chats:0},
                    {label:"Cost / QL",      val:qual>0?spend/qual:0},
                    {label:"Cost / Booking", val:booked>0?spend/booked:0},
                    {label:"Cost / Sell",    val:sells>0?spend/sells:0},
                  ].map(({label,val})=>(
                    <div key={label} className="card">
                      <div className="lbl">{label}</div>
                      <div className="big-num">{fC(val)}</div>
                    </div>
                  ))}
                </div>

                <div className="section-header"><span className="section-dot"/>Revenue — Month to Date</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:28}}>
                  <div className="card-hl">
                    <div className="lbl">New Single Revenue</div>
                    <div className="big-num" style={{color:"var(--cyan-dark)"}}>{fC(revNew)}</div>
                  </div>
                  <div className="card">
                    <div className="lbl">Pack / Member Revenue</div>
                    <div className="big-num">{fC(revPk)}</div>
                  </div>
                  <div className="card-hl" style={{borderLeft:"4px solid var(--green)"}}>
                    <div className="lbl">Total New Revenue</div>
                    <div className="big-num" style={{color:"var(--green)"}}>{fC(revTot)}</div>
                    <div className="sub-txt">ROAS {fX(roas)} · Rev/Sell {sells>0?fC(revTot/sells):"—"}</div>
                  </div>
                </div>

                <div className="section-header"><span className="section-dot"/>Week by Week</div>
                <div style={{background:"var(--surface)",borderRadius:14,border:"1px solid var(--border)",boxShadow:"var(--shadow)",overflow:"hidden"}}>
                  <div style={{overflowX:"auto"}}>
                    <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
                      <thead>
                        <tr>
                          {["Week","Spend","Chats","QL","Booked","Shows","Sells","Chat→Book","ROAS","Revenue"].map(h=>(
                            <th key={h} style={{padding:"10px 14px",textAlign:h==="Week"?"left":"right",
                              color:"var(--text3)",fontSize:10,fontWeight:600,letterSpacing:".08em",
                              borderBottom:"2px solid var(--border)",whiteSpace:"nowrap",background:"var(--surface)"}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {[...monthRows].sort((a,b)=>a.week>b.week?1:-1).map(row=>{
                          const rc=num(row.chats)>0?((num(row.booked)/num(row.chats))*100).toFixed(1)+"%":"—";
                          const ro=num(row.spend)>0?num(row.revenue_total)/num(row.spend):0;
                          const tdS={padding:"10px 14px",textAlign:"right",fontSize:12,color:"var(--text2)",borderBottom:"1px solid var(--border)"};
                          return (
                            <tr key={row.id} className="tbl-row" onClick={()=>{setWeek(row.week);setView("input");}}>
                              <td style={{...tdS,textAlign:"left",fontWeight:700,color:"var(--navy)"}}>{row.week}</td>
                              <td style={tdS}>{fC(row.spend)}</td>
                              <td style={tdS}>{fN(row.chats)}</td>
                              <td style={tdS}>{fN(row.qualified)}</td>
                              <td style={tdS}>{fN(row.booked)}</td>
                              <td style={tdS}>{fN(row.shows)}</td>
                              <td style={tdS}>{fN(row.sells)}</td>
                              <td style={tdS}>{rc}</td>
                              <td style={{...tdS,fontWeight:700,color:ro>=2?"var(--green)":ro>=1?"var(--amber)":"var(--red)"}}>{ro>0?fX(ro):"—"}</td>
                              <td style={{...tdS,fontWeight:700}}>{fC(row.revenue_total)}</td>
                            </tr>
                          );
                        })}
                        <tr style={{background:"var(--navy)"}}>
                          {[
                            {v:"MTD",left:true},{v:fC(spend)},{v:fN(chats)},{v:fN(qual)},
                            {v:fN(booked)},{v:fN(shows)},{v:fN(sells)},
                            {v:fP(ctb)},{v:fX(roas)},{v:fC(revTot)},
                          ].map((c,i)=>(
                            <td key={i} style={{padding:"12px 14px",textAlign:c.left?"left":"right",color:"#fff",fontWeight:700,fontSize:12}}>{c.v}</td>
                          ))}
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  <div style={{padding:"10px 16px",fontSize:11,color:"var(--text3)",borderTop:"1px solid var(--border)"}}>
                    Click any row to edit that week
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* ══ MONTHLY LOG ══ */}
      {view==="log"&&(
        <div style={{maxWidth:1100,margin:"0 auto",padding:"32px 24px"}}>
          <div className="ctrl-bar">
            <div>
              <div className="lbl">Month</div>
              <select value={month} onChange={e=>setMonth(Number(e.target.value))}>
                {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
            </div>
            <div>
              <div className="lbl">Year</div>
              <select value={year} onChange={e=>setYear(Number(e.target.value))}>
                {[2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
              </select>
            </div>
          </div>

          {(()=>{
            const rows=[...getMonthRows(year,month)].sort((a,b)=>a.week>b.week?1:-1);
            if(rows.length===0) return (
              <div className="card" style={{textAlign:"center",padding:"48px",color:"var(--text3)"}}>
                No data for {MONTHS[month]} {year}.
              </div>
            );
            const cols=[
              {key:"spend",         label:"Spend",      fn:fC},
              {key:"chats",         label:"Chats",      fn:fN},
              {key:"unqualified",   label:"Unqual.",    fn:fN},
              {key:"qualified",     label:"Qualified",  fn:fN},
              {key:"booked",        label:"Booked",     fn:fN},
              {key:"shows",         label:"Shows",      fn:fN},
              {key:"sells",         label:"Sells",      fn:fN},
              {key:"revenue_new",   label:"Rev Single", fn:fC},
              {key:"revenue_packs", label:"Rev Packs",  fn:fC},
              {key:"revenue_total", label:"Rev Total",  fn:fC},
              {key:"roas",          label:"ROAS",       fn:v=>num(v).toFixed(2)+"x"},
            ];
            const thS={padding:"10px 14px",textAlign:"right",color:"var(--text3)",fontSize:10,fontWeight:600,letterSpacing:".08em",borderBottom:"2px solid var(--border)",whiteSpace:"nowrap",background:"var(--surface)"};
            return (
              <div style={{background:"var(--surface)",borderRadius:14,border:"1px solid var(--border)",boxShadow:"var(--shadow)",overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
                    <thead>
                      <tr>
                        <th style={{...thS,textAlign:"left"}}>Week</th>
                        {cols.map(c=><th key={c.key} style={thS}>{c.label}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map(row=>{
                        const tdS={padding:"10px 14px",textAlign:"right",fontSize:12,color:"var(--text2)",borderBottom:"1px solid var(--border)"};
                        return (
                          <tr key={row.id} className="tbl-row" onClick={()=>{setWeek(row.week);setView("input");}}>
                            <td style={{...tdS,textAlign:"left",fontWeight:700,color:"var(--navy)"}}>{row.week}</td>
                            {cols.map(c=><td key={c.key} style={tdS}>{c.fn(row[c.key])}</td>)}
                          </tr>
                        );
                      })}
                      <tr style={{background:"var(--navy)"}}>
                        <td style={{padding:"12px 14px",color:"#fff",fontSize:11,fontWeight:700,letterSpacing:".1em"}}>TOTAL</td>
                        {cols.map(c=>{
                          const val=c.key==="roas"
                            ?(sumW(rows,"spend")>0?(sumW(rows,"revenue_total")/sumW(rows,"spend")).toFixed(2)+"x":"—")
                            :c.fn(rows.reduce((s,r)=>s+num(r[c.key]),0));
                          return <td key={c.key} style={{padding:"12px 14px",textAlign:"right",color:"#fff",fontWeight:700,fontSize:12}}>{val}</td>;
                        })}
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div style={{padding:"10px 16px",fontSize:11,color:"var(--text3)",borderTop:"1px solid var(--border)"}}>
                  Click any row to edit · All weeks for {MONTHS[month]} {year}
                </div>
              </div>
            );
          })()}
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
